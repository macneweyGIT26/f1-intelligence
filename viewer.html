<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Intelligence — Document Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            line-height: 1.8;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        header {
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
        }
        
        header a {
            color: #ff6b6b;
            text-decoration: none;
            font-size: 0.9em;
            display: inline-block;
            margin-bottom: 10px;
        }
        
        header a:hover {
            text-decoration: underline;
        }
        
        h1 {
            font-size: 2em;
            margin-bottom: 10px;
            color: #ffd93d;
        }
        
        .doc-content {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }
        
        .doc-content h1 {
            font-size: 2.5em;
            margin: 40px 0 20px 0;
            color: #ffd93d;
        }
        
        .doc-content h2 {
            font-size: 2em;
            margin: 30px 0 15px 0;
            color: #ff6b6b;
            border-left: 4px solid #ff6b6b;
            padding-left: 15px;
        }
        
        .doc-content h3 {
            font-size: 1.5em;
            margin: 25px 0 12px 0;
            color: #6bcf7f;
        }
        
        .doc-content h4, .doc-content h5, .doc-content h6 {
            margin: 15px 0 8px 0;
            color: #bbb;
        }
        
        .doc-content p {
            margin-bottom: 15px;
            color: #ddd;
        }
        
        .doc-content a {
            color: #ff6b6b;
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .doc-content a:hover {
            color: #ffd93d;
            text-decoration: underline;
        }
        
        .doc-content code {
            background: rgba(0, 0, 0, 0.3);
            color: #6bcf7f;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
        
        .doc-content pre {
            background: rgba(0, 0, 0, 0.4);
            border-left: 4px solid #6bcf7f;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 20px 0;
        }
        
        .doc-content pre code {
            background: none;
            color: #6bcf7f;
            padding: 0;
        }
        
        .doc-content ul, .doc-content ol {
            margin: 15px 0 15px 30px;
        }
        
        .doc-content li {
            margin-bottom: 8px;
        }
        
        .doc-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .doc-content table th {
            background: rgba(255, 255, 255, 0.08);
            padding: 12px;
            text-align: left;
            color: #ffd93d;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .doc-content table td {
            padding: 10px 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .doc-content table tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.02);
        }
        
        .doc-content blockquote {
            border-left: 4px solid #ff6b6b;
            padding-left: 15px;
            color: #aaa;
            margin: 20px 0;
            font-style: italic;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }
        
        .error {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.5);
            color: #ff9999;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/">← Back to Home</a>
            <h1>📖 F1 Intelligence Documentation</h1>
        </header>
        
        <div class="doc-content" id="content">
            <div class="loading">Loading document...</div>
        </div>
    </div>
    
    <script>
        // Get file parameter from URL
        const params = new URLSearchParams(window.location.search);
        const file = params.get('file') || '/frameworks/ARCHITECTURE.md';
        
        // Sanitize file path (prevent directory traversal)
        const cleanFile = file.replace(/\.\.\//g, '').replace(/^\/+/, '/');
        
        // Fetch and render markdown
        async function loadDocument() {
            try {
                const response = await fetch(cleanFile);
                
                if (!response.ok) {
                    throw new Error(`File not found: ${cleanFile}`);
                }
                
                const markdown = await response.text();
                const html = marked.parse(markdown);
                const clean = DOMPurify.sanitize(html);
                
                document.getElementById('content').innerHTML = clean;
                document.title = `F1 Intelligence — ${cleanFile.split('/').pop()}`;
            } catch (error) {
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        <strong>Error loading document:</strong><br>
                        ${error.message}
                    </div>
                `;
            }
        }
        
        // Load on page load
        loadDocument();
    </script>
</body>
</html>
